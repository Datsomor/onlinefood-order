version: '3.8'

services:
  web:
    build: .
    container_name: food-order-web
    ports:
      - "8080:80"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=onlinefoodorder
      - DB_USER=postgres
      - DB_PASS=postgres123
      - SITE_URL=http://localhost:8080/
    depends_on:
      - postgres
    volumes:
      - ./:/var/www/html
    networks:
      - food-order-network

  postgres:
    image: postgres:15-alpine
    container_name: food-order-db
    environment:
      - POSTGRES_DB=onlinefoodorder
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql_schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
    networks:
      - food-order-network

  adminer:
    image: adminer:latest
    container_name: food-order-adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - food-order-network

volumes:
  postgres_data:

networks:
  food-order-network:
    driver: bridge